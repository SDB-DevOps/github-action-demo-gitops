apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: github-action-demo
  strategy:
    canary:
      # Progressive rollout: shift traffic in steps, pausing between each.
      # With a single replica this still gates promotion on the pauses;
      # bump `replicas` above for finer-grained traffic weighting.
      steps:
        - setWeight: 25
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 75
        - pause: { duration: 30s }
  template:
    metadata:
      labels:
        app: github-action-demo
    spec:
      containers:
        - name: github-action-demo
          # The tag is managed by Kustomize (see kustomization.yaml `images:`).
          # CI opens a PR that bumps the tag to an immutable sha-<short> value.
          image: ghcr.io/sdb-devops/github-action-demo
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      # Needed if the ghcr.io image/package is private:
      # imagePullSecrets:
      #   - name: ghcr-credentials
