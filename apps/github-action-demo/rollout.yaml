apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  # Blue-green runs the new (green) version at full scale alongside the old
  # (blue) one, then flips the active Service to green on promotion. Expect ~2x
  # pods during the window.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: github-action-demo

  strategy:
    blueGreen:
      activeService: github-action-demo-active     # serves production traffic
      previewService: github-action-demo-preview   # points at green for pre-promotion testing
      autoPromotionEnabled: false                  # hold until you run `promote`
      scaleDownDelaySeconds: 30                     # keep old version 30s after switch for fast rollback
      # No steps / setWeight in blue-green — it's all-or-nothing, not gradual.

  # --- Canary strategy (previous setup) ---
  # To revert: comment out the blueGreen block above and uncomment this, then
  # re-add traefikservice.yaml + analysistemplate.yaml in kustomization.yaml and
  # switch service.yaml / ingressroute.yaml back to their canary variants.
  # strategy:
  #   canary:
  #     canaryService: github-action-demo-canary
  #     stableService: github-action-demo-stable
  #     trafficRouting:
  #       traefik:
  #         weightedTraefikServiceName: github-action-demo
  #     steps:
  #       - setWeight: 25
  #       - analysis:
  #           templates:
  #             - templateName: success-rate
  #       - setWeight: 50
  #       - analysis:
  #           templates:
  #             - templateName: success-rate
  #       - setWeight: 75
  #       - pause: { duration: 60s }
  template:
    metadata:
      labels:
        app: github-action-demo
    spec:
      containers:
        - name: github-action-demo
          # The tag is managed by Kustomize (see kustomization.yaml `images:`).
          # CI opens a PR that bumps the tag to an immutable sha-<short> value.
          image: ghcr.io/sdb-devops/github-action-demo
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 50Mi
            limits:
              cpu: 50m
              memory: 100Mi
      # Needed if the ghcr.io image/package is private:
      # imagePullSecrets:
      #   - name: ghcr-credentials
