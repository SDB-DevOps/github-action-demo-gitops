apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  # With Traefik traffic routing the weight is enforced at the gateway, not by
  # pod ratio, so replicas no longer need to divide the weights. Keep 2 for
  # stable-side redundancy during a rollout.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: github-action-demo
  strategy:
    canary:
      # Traefik splits requests precisely by weight between these two Services.
      # The controller rewrites the TraefikService weights at each step.
      canaryService: github-action-demo-canary
      stableService: github-action-demo-stable
      trafficRouting:
        traefik:
          weightedTraefikServiceName: github-action-demo
      # The first `pause: {}` is indefinite — the rollout holds at 25% until you
      # run `kubectl argo rollouts promote`. Later steps auto-advance on time.
      steps:
        - setWeight: 25
        - pause: { duration: 30s }                 
        - setWeight: 50
        - pause: {}                              # hold here for manual inspection
        - setWeight: 75
        - pause: { duration: 30s }
  template:
    metadata:
      labels:
        app: github-action-demo
    spec:
      containers:
        - name: github-action-demo
          # The tag is managed by Kustomize (see kustomization.yaml `images:`).
          # CI opens a PR that bumps the tag to an immutable sha-<short> value.
          image: ghcr.io/sdb-devops/github-action-demo
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 50Mi
            limits:
              cpu: 50m
              memory: 100Mi
      # Needed if the ghcr.io image/package is private:
      # imagePullSecrets:
      #   - name: ghcr-credentials
