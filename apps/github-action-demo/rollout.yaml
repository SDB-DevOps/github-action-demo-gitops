apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  # With Traefik traffic routing the weight is enforced at the gateway, not by
  # pod ratio, so replicas no longer need to divide the weights. Keep 2 for
  # stable-side redundancy during a rollout.
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: github-action-demo

  # strategy:
  #   blueGreen:
  #     activeService: github-action-demo-active     # 线上流量入口
  #     previewService: github-action-demo-preview   # 预览新版用
  #     autoPromotionEnabled: false                  # 关掉自动晋升 → 手动 promote(适合试验)
  #     scaleDownDelaySeconds: 30                     # 切换后旧版保留 30s,方便秒回滚
      # prePromotionAnalysis / postPromotionAnalysis 可选:接指标自动放行/回滚

  strategy:
    canary:
      # Traefik splits requests precisely by weight between these two Services.
      # The controller rewrites the TraefikService weights at each step.
      canaryService: github-action-demo-canary
      stableService: github-action-demo-stable
      trafficRouting:
        traefik:
          weightedTraefikServiceName: github-action-demo
      # Fully automated: after each setWeight, an AnalysisRun queries Prometheus
      # for canary success rate. Pass -> advance automatically; fail -> abort and
      # roll back to stable. No manual `promote` needed.
      steps:
        - setWeight: 25
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 50
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 75
        - pause: { duration: 60s }
  template:
    metadata:
      labels:
        app: github-action-demo
    spec:
      containers:
        - name: github-action-demo
          # The tag is managed by Kustomize (see kustomization.yaml `images:`).
          # CI opens a PR that bumps the tag to an immutable sha-<short> value.
          image: ghcr.io/sdb-devops/github-action-demo
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 50Mi
            limits:
              cpu: 50m
              memory: 100Mi
      # Needed if the ghcr.io image/package is private:
      # imagePullSecrets:
      #   - name: ghcr-credentials
