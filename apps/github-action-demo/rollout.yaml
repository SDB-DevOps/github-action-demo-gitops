apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  # 4 replicas so canary weights map to whole pods: 25%→1, 50%→2, 75%→3.
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: github-action-demo
  strategy:
    canary:
      # Progressive canary. The first `pause: {}` is indefinite — the rollout
      # holds at 25% until you run `kubectl argo rollouts promote`, so you can
      # inspect the canary before it advances. Later steps auto-advance on time.
      steps:
        - setWeight: 25
        - pause: {}                 # hold here for manual inspection
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 75
        - pause: { duration: 30s }
  template:
    metadata:
      labels:
        app: github-action-demo
    spec:
      containers:
        - name: github-action-demo
          # The tag is managed by Kustomize (see kustomization.yaml `images:`).
          # CI opens a PR that bumps the tag to an immutable sha-<short> value.
          image: ghcr.io/sdb-devops/github-action-demo
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 50Mi
            limits:
              cpu: 50m
              memory: 100Mi
      # Needed if the ghcr.io image/package is private:
      # imagePullSecrets:
      #   - name: ghcr-credentials
