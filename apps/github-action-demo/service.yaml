apiVersion: v1
kind: Service
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  type: NodePort
  selector:
    app: github-action-demo
  ports:
    - name: http
      protocol: TCP
      port: 80          # Service port inside the cluster
      targetPort: 3000  # Container port
      nodePort: 30080   # External port on each node (range 30000-32767)
