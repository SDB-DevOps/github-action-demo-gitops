# Two Services for the canary split. Argo Rollouts injects the
# `rollouts-pod-template-hash` selector into each so `stable` only targets the
# stable ReplicaSet and `canary` only targets the canary ReplicaSet.
apiVersion: v1
kind: Service
metadata:
  name: github-action-demo-stable
  labels:
    app: github-action-demo
spec:
  type: ClusterIP
  selector:
    app: github-action-demo
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: github-action-demo-canary
  labels:
    app: github-action-demo
spec:
  type: ClusterIP
  selector:
    app: github-action-demo
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000

