# Blue-green Services. Argo Rollouts injects the `rollouts-pod-template-hash`
# selector: `active` targets the live (blue) ReplicaSet, `preview` targets the
# new (green) ReplicaSet. On promotion the controller flips `active` to green.
apiVersion: v1
kind: Service
metadata:
  name: github-action-demo-active
  labels:
    app: github-action-demo
spec:
  type: ClusterIP
  selector:
    app: github-action-demo
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: github-action-demo-preview
  labels:
    app: github-action-demo
spec:
  type: ClusterIP
  selector:
    app: github-action-demo
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000

