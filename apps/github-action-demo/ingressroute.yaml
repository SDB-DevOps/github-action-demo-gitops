# Exposes the app through Traefik's `web` entrypoint (port 80) and routes to the
# weighted TraefikService above. Replace PathPrefix(`/`) with Host(`your.domain`)
# once you have a hostname.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: github-action-demo
          kind: TraefikService
        # - name: github-action-demo-active   # kind 默认 Service,不用 TraefikService
        #   port: 80
