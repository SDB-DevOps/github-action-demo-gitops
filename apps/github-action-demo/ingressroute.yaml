# Exposes the app through Traefik's `web` entrypoint (port 80). For blue-green
# it points straight at the active Service — no weighted TraefikService needed.
# Promotion flips `active`'s selector to green, so external traffic follows
# automatically. Replace PathPrefix(`/`) with Host(`your.domain`) when you have one.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: github-action-demo
  labels:
    app: github-action-demo
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        # - name: github-action-demo-active
        #   port: 80
        # --- Canary variant (previous setup; use this instead of active for canary) ---
        - name: github-action-demo
          kind: TraefikService
