apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- rollout.yaml
- service.yaml
- ingressroute.yaml
# Canary-only (uncomment to revert to canary):
# - traefikservice.yaml
# - analysistemplate.yaml

# `newTag` is the single source of truth for what is deployed.
# The deploy workflow runs `kustomize edit set image` to bump this to an
# immutable sha-<short> tag, then opens a PR. Merging the PR is what triggers
# ArgoCD to sync the new image into the cluster.
images:
- name: ghcr.io/sdb-devops/github-action-demo
  newTag: sha-e97b625
